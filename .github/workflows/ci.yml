name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  python:
    name: Python (contracts-py + fitness-engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-packages --extra dev

      - name: Run pytest with coverage
        run: |
          uv run pytest packages/contracts-py packages/fitness-engine -v \
            --cov=fitness_engine --cov-report=term-missing --cov-fail-under=80

  typescript:
    name: TypeScript (contracts-ts)
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.x"

      - name: Set up Python (schema export 用)
        run: uv python install 3.11

      - name: Install Python deps
        run: uv sync --all-packages --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.21.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Node deps
        run: pnpm install --frozen-lockfile

      - name: Regenerate contracts (schemas + types + zod)
        run: |
          uv run python -m fitness_contracts.schema_export packages/contracts-ts/schemas
          pnpm --filter @fitness/contracts-ts generate

      - name: Verify generated files match committed copies
        run: |
          if ! git diff --exit-code -- packages/contracts-ts/schemas packages/contracts-ts/generated; then
            echo "ERROR: generated contracts are out of sync. Run 'make contracts' locally and commit." >&2
            exit 1
          fi

      - name: Run vitest
        run: pnpm --filter @fitness/contracts-ts test
